<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus FC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-area">
    <div class="logo-circle">N</div>
    <div>
      <h2>NEXUS</h2>
      <span>FC FUTSAL</span>
    </div>
  </div>

  <div id="areaUsuario">
  <button class="btn-login" onclick="abrirLogin()" id="btnEntrar">ENTRAR</button>
</div>
</header>

<!-- CONTEÚDO -->
<main class="container">

  <!-- HERO -->
  <section class="hero">
    <span class="local">🟢 ARACAJU • SERGIPE</span>

    <h1>NEXUS<br>FC</h1>

    <p>Futsal que conecta. Força que une.</p>

    <div class="buttons">
      <button class="btn-primary" onclick="irPagina('agenda.html')">📅 VER AGENDA</button>
<button class="btn-outline" onclick="irPagina('equipe.html')">CONHEÇA A EQUIPE</button>
    </div>
  </section>

  <!-- PRÓXIMO JOGO -->
  <section class="card jogo">
    <span class="tag">PRÓXIMO JOGO</span>

    <p>16 ABR • 20h • Ginásio Municipal</p>

    <div class="times">
      <div>Nexus FC</div>
      <div class="vs">X</div>
      <div>Dragões FC</div>
    </div>
  </section>

</main>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html">🏠<span>Início</span></a>
<a href="equipe.html">👥<span>Equipe</span></a>
<a href="agenda.html">📅<span>Agenda</span></a>
<a href="resultados.html">📊<span>Resultados</span></a>
<a href="perfil.html">👤<span>Perfil</span></a>
</nav>


<!-- MODAL LOGIN -->
<div class="modal" id="modalLogin">

  <div class="modal-box">
    
    <input type="text" id="nomeJogador" placeholder="Seu nome">
    <input type="password" id="senhaJogador" placeholder="Senha">
    <input type="number" id="numeroJogador" placeholder="Número (camisa)">

    <hr>

<h4>Modo Administrador 👑</h4>

<input type="text" id="nomeAdmin" placeholder="Admin">
<input type="password" id="senhaAdmin" placeholder="Senha">

<button onclick="loginAdmin()">Entrar como ADM</button>

    <button onclick="loginJogador()">Entrar</button>
    <button onclick="cadastrar()">Criar Conta</button>

    <span onclick="fecharModal()">Fechar</span>
  </div>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
