<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus FC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-area">
    <div class="logo-circle">N</div>
    <div>
      <h2>NEXUS</h2>
      <span>FC FUTSAL</span>
    </div>
  </div>

  <button class="btn-login">ENTRAR</button>
</header>

<!-- CONTEÚDO -->
<main class="container">

  <!-- HERO -->
  <section class="hero">
    <span class="local">🟢 ARACAJU • SERGIPE</span>

    <h1>NEXUS<br>FC</h1>

    <p>Futsal que conecta. Força que une.</p>

    <div class="buttons">
      <button class="btn-primary">📅 VER AGENDA</button>
      <button class="btn-outline">CONHEÇA A EQUIPE</button>
    </div>
  </section>

  <!-- PRÓXIMO JOGO -->
  <section class="card jogo">
    <span class="tag">PRÓXIMO JOGO</span>

    <p>16 ABR • 20h • Ginásio Municipal</p>

    <div class="times">
      <div>Nexus FC</div>
      <div class="vs">X</div>
      <div>Dragões FC</div>
    </div>
  </section>

</main>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="#">🏠<span>Início</span></a>
  <a href="#">👥<span>Equipe</span></a>
  <a href="#">📅<span>Agenda</span></a>
  <a href="#">📊<span>Resultados</span></a>
  <a href="#">👤<span>Perfil</span></a>
</nav>

</body>
</html>
